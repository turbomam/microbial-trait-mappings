name: Validate Mappings

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pytest -v

  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync
      - name: Validate TSV column schemas
        run: uv run mtm-validate --input-dir data/
      - name: Check normalization consistency
        run: uv run mtm-normalize --check --input-dir data/ --strict

  build-schema:
    runs-on: ubuntu-latest
    needs: [validate-schemas]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync
      - name: Build LinkML validation schema
        run: |
          mkdir -p generated
          uv run mtm-build-schema --input-dir data/ --output generated/validation_schema.yaml
      - uses: actions/upload-artifact@v7
        with:
          name: validation-schema
          path: generated/validation_schema.yaml

  # CURIE verification is expensive (downloads ontology SQLite DBs).
